<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termeno TRMO Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://alwingulla.com/88/p.js" data-zone="10148380" data-sdk="show_10148380"></script>
    <script src='//libtl.com/sdk.js' data-zone='10148380' data-sdk='show_10148380'></script>

    <style>
        :root { --main-color: #f3ba2f; --bg-color: #000; }
        body { background: var(--bg-color); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; user-select: none; }
        
        .header { padding: 20px 10px; font-size: 28px; font-weight: bold; color: var(--main-color); }
        #countdown-timer { background: #111; padding: 10px; border-radius: 10px; margin: 10px 20px; border: 1px solid #333; font-size: 14px; }
        #timer-display { color: #fff; font-weight: bold; font-size: 18px; }

        #coin-container { position: relative; height: 260px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 200px; height: 200px; background: radial-gradient(circle, #f3ba2f 0%, #a87f1a 100%); 
                border-radius: 50%; box-shadow: 0 0 40px rgba(243, 186, 47, 0.4); 
                display: flex; align-items: center; justify-content: center; font-size: 80px; 
                cursor: pointer; transition: transform 0.05s; border: 6px solid #634d11; }
        #coin:active { transform: scale(0.92); }

        .energy-wrapper { margin: 15px auto; width: 85%; }
        .energy-container { background: #333; height: 16px; border-radius: 10px; overflow: hidden; }
        #energy-bar { background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 100%; height: 100%; transition: width 0.3s; }
        
        .btn-ad, .btn-social { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; margin-bottom: 10px; font-size: 14px; }
        .btn-ad { background: #ff4444; color: white; }
        .btn-social.youtube { background: #FF0000; color: white; }
        .btn-social.twitter { background: #1DA1F2; color: white; }

        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #111; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--main-color); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; color: black; }

        .floating-text { position: absolute; color: white; font-weight: bold; font-size: 26px; pointer-events: none; animation: floatUp 0.6s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">🪙 <span id="balance">0</span> TRMO</div>

    <div id="countdown-timer">
        ⏳ TGE Launch (10 April):
        <div id="timer-display">Calculating...</div>
    </div>
    
    <div id="coin-container">
        <div id="coin">💎</div>
    </div>

    <div class="energy-wrapper">
        <div class="energy-container"><div id="energy-bar"></div></div>
        <div style="margin-top:5px; font-size: 13px;">⚡ <span id="energy-text">0/1000</span></div>
    </div>

    <button class="btn-ad" onclick="watchAdForCoins()">📺 Watch Ad (+10,000 TRMO)</button>
    
    <div style="padding-bottom: 120px;">
        <button class="btn-social youtube" onclick="completeSocialTask('youtube')">📹 YouTube (+25,000)</button>
        <button class="btn-social twitter" onclick="completeSocialTask('twitter')">🐦 Twitter (+15,000)</button>
        <button class="btn-action" style="width: 85%; margin: 10px auto;" onclick="shareReferral()">👥 Invite Friends (+5,000)</button>
    </div>

    <div class="menu">
        <div class="menu-item">
            <p style="font-size: 10px; margin: 0;">Multi-Tap Lvl <span id="tap-lvl">1</span></p>
            <button class="btn-action" onclick="upgrade('multitap')">UP 500</button>
        </div>
        <div class="menu-item">
            <p style="font-size: 10px; margin: 0;">Recharge Lvl <span id="reg-lvl">1</span></p>
            <button class="btn-action" onclick="upgrade('recharge')">UP 1000</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! YAHAN APNI REAL CONFIG DALEIN !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAECs5xPMQEc8k3pfK47gG0Qojau3frqjk",
  authDomain: "termeno-b8818.firebaseapp.com",
  projectId: "termeno-b8818",
  storageBucket: "termeno-b8818.firebasestorage.app",
  messagingSenderId: "745968470632",
  appId: "1:745968470632:web:736dd38c2e4b0fec50c9dd",
  measurementId: "G-47TVSSV6KK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        
        const userId = String(tg.initDataUnsafe.user?.id || "test_user");
        const userRef = doc(db, "users", userId);

        let data = { coins: 0, energy: 1000, maxEnergy: 1000, multiTap: 1, rechargeSpeed: 1, tasks: { youtube: false, twitter: false } };

        async function init() {
            try {
                const snap = await getDoc(userRef);
                if (snap.exists()) { data = { ...data, ...snap.data() }; } 
                else {
                    const startParam = tg.initDataUnsafe.start_param;
                    if (startParam && startParam !== userId) {
                        const inviterRef = doc(db, "users", String(startParam));
                        updateDoc(inviterRef, { coins: increment(5000) }).catch(e => console.log(e));
                        data.coins = 1000;
                    }
                    await setDoc(userRef, data);
                }
                updateUI();
                startTimer();
            } catch (err) { console.error(err); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('energy-bar').style.width = (data.energy / data.maxEnergy * 100) + "%";
            document.getElementById('energy-text').innerText = `${Math.floor(data.energy)}/${data.maxEnergy}`;
            document.getElementById('tap-lvl').innerText = data.multiTap;
            document.getElementById('reg-lvl').innerText = data.rechargeSpeed;
        }

        function startTimer() {
            const tgeDate = new Date("April 10, 2026 00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = tgeDate - now;
                if (diff < 0) { document.getElementById('timer-display').innerText = "🚀 TGE LIVE!"; return; }
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('timer-display').innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        // Global functions for HTML access
        window.upgrade = async (type) => {
            const cost = type === 'multitap' ? 500 : 1000;
            if (data.coins >= cost) {
                data.coins -= cost;
                if(type === 'multitap') data.multiTap++; else data.rechargeSpeed++;
                updateUI(); await setDoc(userRef, data);
            } else { tg.showAlert("Not enough TRMO!"); }
        };


        

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (data.energy >= data.multiTap) {
                const touch = e.touches[0];
                data.coins += data.multiTap;
                data.energy -= data.multiTap;
                showFloatingText(touch.clientX, touch.clientY, `+${data.multiTap}`);
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
                saveData();
            }
        });

        function showFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        let saveTimeout;
        function saveData() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await updateDoc(userRef, data).catch(e => console.log(e));
            }, 2000);
        }

        window.watchAdForCoins = () => {
            const zoneId = "10148380"; 
            if (typeof window[`show_${zoneId}`] === 'function') {
                window[`show_${zoneId}`]().then(async () => {
                    data.coins += 10000; updateUI();
                    await updateDoc(userRef, { coins: increment(10000) });
                }).catch(() => tg.showAlert("Ad not ready."));
            }
        };

        window.completeSocialTask = (platform) => {
            const link = platform === 'youtube' ? "YOUR_YT_LINK" : "YOUR_TW_LINK";
            tg.openLink(link);
            tg.showConfirm("Did you follow?", async (res) => {
                if (res && !data.tasks[platform]) {
                    const reward = platform === 'youtube' ? 25000 : 15000;
                    data.coins += reward; data.tasks[platform] = true;
                    updateUI(); await updateDoc(userRef, data);
                }
            });
        };

        window.shareReferral = () => {
            const bot = "termeno_bot";
            const link = `https://t.me/${bot}/app?startapp=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join%20TRMO!`);
        };

        setInterval(() => { if (data.energy < data.maxEnergy) { data.energy = Math.min(data.maxEnergy, data.energy + data.rechargeSpeed); updateUI(); } }, 1000);
        
        init();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
