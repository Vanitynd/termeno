<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termeno Tap-to-Earn Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://alwingulla.com/88/p.js" data-zone="10148380" data-sdk="show_10148380"></script>
    <script src='//libtl.com/sdk.js' data-zone='10148380' data-sdk='show_10148380'></script>
    
    <style>
        :root { --main-color: #f3ba2f; --bg-color: #000; }
        body { background: var(--bg-color); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        
        .header { padding: 30px 10px; font-size: 32px; font-weight: bold; color: var(--main-color); }
        
        #coin-container { position: relative; height: 300px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 220px; height: 220px; background: radial-gradient(circle, #f3ba2f 0%, #a87f1a 100%); 
                border-radius: 50%; box-shadow: 0 0 50px rgba(243, 186, 47, 0.4); 
                display: flex; align-items: center; justify-content: center; font-size: 90px; 
                cursor: pointer; transition: transform 0.05s; z-index: 2; border: 8px solid #634d11; }
        #coin:active { transform: scale(0.92); }

        .energy-wrapper { margin: 20px auto; width: 85%; }
        .energy-container { background: #333; height: 18px; border-radius: 10px; overflow: hidden; }
        #energy-bar { background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 100%; height: 100%; transition: width 0.3s; }
        .energy-info { margin-top: 8px; font-size: 14px; font-weight: bold; }

        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #111; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--main-color); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; color: black; }

        .floating-text { position: absolute; color: white; font-weight: bold; font-size: 28px; pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div class="header">🪙 <span id="balance">0</span></div>
    
    <div id="coin-container">
        <div id="coin">💎</div>
    </div>

    <div class="energy-wrapper">
        <div class="energy-container">
            <div id="energy-bar"></div>
        </div>
        <div class="energy-info">⚡ <span id="energy-text">Loading...</span></div>
    </div>

    <button class="btn-action" style="width: 80%; margin: 0 auto 100px; display: block;" onclick="shareReferral()">👥 INVITE FRIENDS (+5,000)</button>

    <div style="margin: 20px 0;">
    <button class="btn-action" onclick="watchAdForCoins()" style="background: #ff4444; color: white;">
        📺 WATCH AD (+5,000 Coins)
    </button>
</div>

    <div class="menu">
        <div class="menu-item">
            <p style="font-size: 10px; margin: 0;">Multi-Tap Lvl <span id="tap-lvl">1</span></p>
            <button class="btn-action" onclick="upgrade('multitap')">UP 500</button>
        </div>
        <div class="menu-item">
            <p style="font-size: 10px; margin: 0;">Recharge Lvl <span id="reg-lvl">1</span></p>
            <button class="btn-action" onclick="upgrade('recharge')">UP 1000</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! APNI FIREBASE CONFIG YAHAN PASTE KAREIN !!!
        const firebaseConfig = {
            apiKey: "AIzaSyAECs5xPMQEc8k3pfK47gG0Qojau3frqjk",
            authDomain: "termeno-b8818.firebaseapp.com",
            projectId: "termeno-b8818",
            storageBucket: "termeno-b8818.firebasestorage.app",
            messagingSenderId: "745968470632",
            appId: "1:745968470632:web:736dd38c2e4b0fec50c9dd",
            measurementId: "G-47TVSSV6KK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        
        const userId = String(tg.initDataUnsafe.user?.id || "test_user");
        const userRef = doc(db, "users", userId);

        let data = { coins: 0, energy: 1000, maxEnergy: 1000, multiTap: 1, rechargeSpeed: 1 };

        async function init() {
            try {
                const snap = await getDoc(userRef);
                const startParam = tg.initDataUnsafe.start_param;

                if (snap.exists()) {
                    data = { ...data, ...snap.data() };
                } else {
                    // Referral Logic
                    if (startParam && startParam !== userId) {
                        const inviterRef = doc(db, "users", String(startParam));
                        await updateDoc(inviterRef, { coins: increment(5000) }).catch(e => console.log(e));
                        data.coins = 1000;
                    }
                    await setDoc(userRef, data);
                }
                updateUI();
            } catch (err) { console.error("Init Error:", err); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(data.coins).toLocaleString();
            document.getElementById('energy-bar').style.width = (data.energy / data.maxEnergy * 100) + "%";
            document.getElementById('energy-text').innerText = `${Math.floor(data.energy)}/${data.maxEnergy}`;
            document.getElementById('tap-lvl').innerText = data.multiTap;
            document.getElementById('reg-lvl').innerText = data.rechargeSpeed;
        }

        // Tap Event
        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (data.energy >= data.multiTap) {
                const touch = e.touches[0];
                data.coins += data.multiTap;
                data.energy -= data.multiTap;
                
                showFloatingText(touch.clientX, touch.clientY, `+${data.multiTap}`);
                tg.HapticFeedback.impactOccurred('medium');
                updateUI();
                saveData();
            }
        });

        function showFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        // Auto Recharge (Every 1 Sec)
        setInterval(() => {
            if (data.energy < data.maxEnergy) {
                data.energy = Math.min(data.maxEnergy, data.energy + (data.rechargeSpeed * 1));
                updateUI();
            }
        }, 1000);

        // Auto Save (Every 3 Sec after last tap)
        let saveTimeout;
        function saveData() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await updateDoc(userRef, data).catch(e => console.log(e));
            }, 3000);
        }

        // Functions for Buttons
        window.upgrade = async (type) => {
            if (type === 'multitap' && data.coins >= 500) {
                data.coins -= 500; data.multiTap++;
            } else if (type === 'recharge' && data.coins >= 1000) {
                data.coins -= 1000; data.rechargeSpeed++;
            }
            updateUI();
            await setDoc(userRef, data);
        };

        window.shareReferral = () => {
            const botUser = "termeno_bot"; // Apne bot ka username yahan likhein
            const inviteLink = `https://t.me/${botUser}/app?startapp=${userId}`;
            const text = "Join Termeno Tap-to-Earn! 🪙";
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=${encodeURIComponent(text)}`);
        };

        // 2. Rewarded Ad Function
        window.watchAdForCoins = async () => {
            if (typeof show_YOUR_ZONE_ID === 'function') {
                show_YOUR_ZONE_ID().then(() => {
                    // Ad khatam hone par reward dein
                    data.coins += 5000;
                    updateUI();
                    saveData();
                    alert("Mubarak ho! Aapne 5,000 coins jeete.");
                }).catch((err) => {
                    console.error("Ad load nahi hua:", err);
                    alert("Ad abhi available nahi hai, baad mein try karein.");
                });
            }
        };

        init();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
